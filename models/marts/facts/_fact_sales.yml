version: 2

models:
  - name: fact_sales
    description:
      Sales fact at order-line grain with degenerate dimension for order_id
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          arguments:
            compare_model: ref('int__sales_enriched')
    columns:
      - name: sales_key
        description: Surrogate PK
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
      - name: date_key
        description: FK to dim_date
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: product_key
        description: FK to dim_product
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_key
      - name: customer_key
        description: FK to dim_customer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: quantity
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
